<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">My Availability Test</h1>
        
        <div class="bg-white rounded-xl shadow-lg p-6">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">My Availability</h1>
                    <p class="text-gray-600 mt-2">Manage your available time slots for appointments</p>
                </div>
                <div class="flex space-x-3">
                    <button class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Save Changes
                    </button>
                    <button class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        Block Date (Holiday)
                    </button>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-3">
                    Select Date
                </label>
                <input type="date" class="px-4 py-3 border border-gray-300 rounded-lg" />
            </div>

            <div class="mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-semibold text-gray-800">Time Slots</h3>
                    <div class="flex items-center space-x-6 text-sm">
                        <div class="flex items-center space-x-2">
                            <div class="w-4 h-4 bg-green-500 rounded"></div>
                            <span class="text-gray-600">Available</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="w-4 h-4 bg-gray-200 border border-gray-300 rounded"></div>
                            <span class="text-gray-600">Unavailable</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3" id="timeSlots">
                    <!-- Time slots will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Generate time slots from 00:00 to 23:30
        function generateTimeSlots() {
            const container = document.getElementById('timeSlots');
            container.innerHTML = '';
            
            for (let hour = 0; hour <= 23; hour++) {
                ['00', '30'].forEach(minutes => {
                    if (hour === 23 && minutes === '30') return; // Skip 23:30 as it would go to 24:00
                    
                    const time = `${hour.toString().padStart(2, '0')}:${minutes}`;
                    const button = document.createElement('button');
                    button.className = 'py-3 px-2 rounded-lg text-sm font-medium transition-all transform hover:scale-105 bg-white text-gray-700 border-2 border-gray-300 hover:border-gray-400 hover:bg-gray-50 cursor-pointer';
                    button.textContent = time;
                    button.onclick = function() {
                        this.classList.toggle('bg-green-500');
                        this.classList.toggle('text-white');
                        this.classList.toggle('border-green-600');
                        this.classList.toggle('shadow-md');
                        this.classList.toggle('hover:bg-green-600');
                        this.classList.toggle('hover:shadow-lg');
                        this.classList.toggle('bg-white');
                        this.classList.toggle('text-gray-700');
                        this.classList.toggle('border-gray-300');
                    };
                    container.appendChild(button);
                });
            }
        }

        generateTimeSlots();
    </script>
</body>
</html>
