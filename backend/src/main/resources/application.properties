spring.application.name=hms-backend
server.port=8080
# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/hms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Vishal@74
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable DDL auto-update in production (use Flyway instead)
spring.jpa.hibernate.ddl-auto=update

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Show SQL queries in console (good for learning)
spring.jpa.show-sql=true

# Tell Hibernate we are using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Config
jwt.secret=4rMa8X7kL9zQ2pV5sJ3tH6bN1fY8dC0eG4oW7jI2uA5mZ
jwt.expiry=86400000

# SpringDoc configuration
springdoc.packages-to-scan=com.vishal.hms_backend.controller
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=false
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=2
